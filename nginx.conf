worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml image/svg+xml;

    server {
        listen 80 default_server;
        server_name _;

        root /var/www/element;
        index index.html;

        # Optimization for slow connections
        client_body_buffer_size 128k;
        client_header_buffer_size 1k;
        client_max_body_size 50M;
        large_client_header_buffers 4 4k;

        # Proxy buffers
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        # Logging for debug
        access_log /dev/stdout;
        error_log /dev/stdout;

        # Cloudflare IP Restoration
        # ... (unchanged)

        # Security Headers (Adjusted for Onion/HTTP)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # CSP relaxed to allow http: for onion addresses
        add_header Content-Security-Policy "default-src 'self' http: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' http: https:; style-src 'self' 'unsafe-inline' http: https:; img-src 'self' data: http: https:; connect-src 'self' http: https: wss:; font-src 'self' data: http: https:; frame-ancestors 'none'; object-src 'none';" always;

        # Serve Element Web Client
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy Matrix API to Conduit (running on 6167 locally)
        location /_matrix {
            proxy_pass http://conduit:6167;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            client_max_body_size 50M;
        }

        # Serve Matrix discovery files with proper CORS headers
        location /.well-known/matrix {
            default_type application/json;
            add_header Access-Control-Allow-Origin * always;
            try_files $uri =404;
        }

        # ACME Challenge for Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
    }
}
