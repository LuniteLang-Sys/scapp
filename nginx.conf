worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    server_tokens off;

    # Cấp độ bảo mật tối đa: Chống iframe, chống giả mạo MIME, tắt Referrer
    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; media-src 'self' blob:; worker-src 'self' blob:;";
    add_header Referrer-Policy "no-referrer";

    server {
        listen *:__PORT__;

        # Healthcheck for Render (must be accessible from Render's load balancers)
        location /_healthz {
            access_log off;
            return 200 "OK";
        }

        # Block all traffic that is not from the local Tor daemon
        allow 127.0.0.1;
        deny all;

        # Chỉ cho phép truy cập nếu trình duyệt gõ đúng tên miền .onion
        # Bất kỳ ai cố truy cập bằng IP nội bộ hoặc tên miền Render đều bị từ chối (Mã 444: Đóng kết nối lập tức)
        if ($host !~* "\.onion$") {
            return 444;
        }

        root /var/www/element;
        index index.html index.htm;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /_matrix {
            proxy_pass http://127.0.0.1:6167;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
            client_max_body_size 50M;
        }
    }
}
