worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    server_tokens off;

    # Headers bảo mật tối đa
    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; media-src 'self' blob:; worker-src 'self' blob:;";
    add_header Referrer-Policy "no-referrer";

    server {
        listen 0.0.0.0:__PORT__;

        # Healthcheck cho Render load balancers (KHÔNG BỊ CHẶN)
        location = /_healthz {
            access_log off;
            return 200 "OK";
        }

        location / {
            # Chỉ cho phép .onion
            if ($host !~* "\.onion$") {
                return 403;
            }
            # Chỉ cho phép localhost (Tor)
            allow 127.0.0.1;
            deny all;

            root /var/www/element;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        location /_matrix {
            # Chỉ cho phép .onion
            if ($host !~* "\.onion$") {
                return 403;
            }
            # Chỉ cho phép localhost (Tor)
            allow 127.0.0.1;
            deny all;

            proxy_pass http://127.0.0.1:6167;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $remote_addr;
            client_max_body_size 50M;
        }
    }
}
