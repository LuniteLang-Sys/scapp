worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        # Render will route traffic to this port
        listen 10000 default_server;
        server_name _;

        root /var/www/element;
        index index.html;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:; connect-src 'self' https: wss:; font-src 'self' data: https:; frame-ancestors 'none'; object-src 'none';" always;

        # Serve Element Web Client
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy Matrix API to Conduit (running on 6167 locally)
        location /_matrix {
            proxy_pass http://127.0.0.1:6167;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            client_max_body_size 50M;
        }

        # Serve Matrix discovery files with proper CORS headers
        location /.well-known/matrix {
            default_type application/json;
            add_header Access-Control-Allow-Origin * always;
            try_files $uri =404;
        }
    }
}
