version: '3.8'

services:
  # Conduit Backend
  conduit:
    build:
      context: .
      dockerfile: Dockerfile.conduit
    container_name: scapp_conduit
    volumes:
      - ./conduit_db:/var/lib/conduit
      - ./config:/etc/conduit
    restart: unless-stopped
    networks:
      - scapp_net

  # Nginx Reverse Proxy & Element
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: scapp_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./element:/var/www/element
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    restart: unless-stopped
    networks:
      - scapp_net
    depends_on:
      - conduit

  # Certbot
  certbot:
    image: certbot/certbot
    container_name: scapp_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    restart: unless-stopped
    networks:
      - scapp_net

  # Tor Onion Service
  tor:
    image: alpine:latest
    container_name: scapp_tor
    command: ["apk add tor && tor -f /etc/tor/torrc"]
    volumes:
      - ./tor_data:/var/lib/tor
      - ./torrc:/etc/tor/torrc:ro
    restart: unless-stopped
    networks:
      - scapp_net

networks:
  scapp_net:
    driver: bridge
